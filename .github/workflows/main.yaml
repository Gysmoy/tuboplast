name: Deploy Tuboplast to Contabo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DEPLOYMENTS_URL: https://devex.pe/free/deployments
      SERVICE_NAME: Tuboplast

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Docker Commands on Server
        id: deploy
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          set +e
          rm -f deploy.log

          {
            set -Eeuo pipefail

            if ! command -v sshpass >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y sshpass
            fi

            sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" 'bash -se' <<'REMOTE_SCRIPT'
          set -Eeuo pipefail

          cd /var/docker/tuboplast
          git pull

          docker builder prune -f
          docker network prune -f
          docker image prune -f

          docker compose up -d --build
          REMOTE_SCRIPT
          } 2>&1 | tee deploy.log

          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Notify deployment result
        if: always()
        env:
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          AUTHOR_NAME: ${{ github.event.head_commit.author.name }}
          AUTHOR_EMAIL: ${{ github.event.head_commit.author.email }}
          EXIT_CODE: ${{ steps.deploy.outputs.exit_code }}
        run: |
          set -Eeuo pipefail

          status="success"
          if [ "${EXIT_CODE:-1}" != "0" ]; then
            status="failed"
          fi

          error_log="$(tail -n 120 deploy.log 2>/dev/null || true)"
          export status error_log

          python3 - <<'PY' > deployment-payload.json
          import datetime
          import json
          import os

          status = os.environ.get("status", "failed")

          payload = {
              "service": os.environ.get("SERVICE_NAME", "Tuboplast"),
              "repository": os.environ.get("REPOSITORY", ""),
              "branch": os.environ.get("BRANCH", ""),
              "commit": os.environ.get("COMMIT", ""),
              "message": os.environ.get("COMMIT_MSG", ""),
              "author_name": os.environ.get("AUTHOR_NAME", ""),
              "author_email": os.environ.get("AUTHOR_EMAIL", ""),
              "env": "production",
              "status": status,
              "timestamp": datetime.datetime.now(datetime.timezone.utc).isoformat(),
          }

          if status == "failed":
              payload["exit_code"] = os.environ.get("EXIT_CODE") or "1"
              payload["error"] = os.environ.get("error_log", "").strip()[-6000:]

          print(json.dumps(payload, ensure_ascii=False))
          PY

          curl --show-error --silent --fail-with-body \
            -X POST "$DEPLOYMENTS_URL" \
            -H "Content-Type: application/json" \
            --data @deployment-payload.json

      - name: Fail workflow when deployment fails
        if: always() && steps.deploy.outputs.exit_code != '0'
        env:
          EXIT_CODE: ${{ steps.deploy.outputs.exit_code }}
        run: |
          exit "${EXIT_CODE:-1}"
